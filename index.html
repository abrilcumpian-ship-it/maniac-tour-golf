const gE=(hcp,idx)=>{if(hcp<=0)return idx<=Math.abs(hcp)?-1:0;if(hcp<=18)return idx<=hcp?1:0;if(hcp<=36)return idx<=(hcp-18)?2:1;return idx<=(hcp-36)?3:2;};
const stb=(g,p,e)=>{if(!g)return 0;const d=g-e-p;return d<=-3?5:d===-2?4:d===-1?3:d===0?2:d===1?1:0;};

// Función para mostrar nombre con handicap: "Nombre hcp (hcpJuego)"
// Rodiles (esR:true) redondea a la baja, el resto al alza
const nomConHcp=(jug,jugadores)=>{
if(!jug)return'';
const j=jugadores?.find(x=>x.nombre===jug.nombre||x.nombre===jug)||jug;
const nombre=j.nombre||jug.nombre||jug;
const hcp=j.hcp;
if(hcp===undefined||hcp===null)return nombre;
const hcpJuego=j.esR?Math.floor(hcp):Math.ceil(hcp);
return`${nombre} ${hcp} (${hcpJuego})`;
};

// Ryder Cup - Puntuación ponderada para equilibrar equipos
const calcPuntajeEquilibrio=(jug)=>{
const posClasif=CLASIF.find(c=>c.nombre===jug.nombre)?.pos||99;
const hcp=jug.hcp||20;
// Ponderación: 60% handicap, 40% clasificación (normalizado)
return(hcp*0.6)+((posClasif/13)*20*0.4);
};

// Formar equipos equilibrados de 6 jugadores cada uno
const formarEquiposRyder=(jugadores)=>{
if(jugadores.length<12)return null;
const sorted=[...jugadores].sort((a,b)=>calcPuntajeEquilibrio(a)-calcPuntajeEquilibrio(b));
const equipoA=[];const equipoB=[];
// Método serpentina: 1-2-2-2-2-2-1
for(let i=0;i<12;i++){
const jug=sorted[i];
if(i%4===0||i%4===3)equipoA.push(jug);
else equipoB.push(jug);
}
return{equipoA,equipoB};
};

// Formar parejas dentro de un equipo
const formarParejasRyder=(equipo)=>{
const parejas=[];
for(let i=0;i<equipo.length;i+=2){
if(i+1<equipo.length){
parejas.push({id:Date.now()+i,jug:[equipo[i],equipo[i+1]],resultado:null});
}}
return parejas;
};

// ========== FUNCIONES DE ESTADÍSTICAS ==========
const calcEstadisticas=()=>{
const stats=[];
const jugNombres=[...new Set(PRUEBAS_HIST.flatMap(p=>p.res.map(r=>r.nombre)))];
const PRUEBAS_RESTANTES=8;

jugNombres.forEach(nombre=>{
// Obtener datos del jugador
const jugInfo=JUG_INI.find(j=>j.nombre===nombre)||{hcp:15};
const hcp=jugInfo.hcp;

// Historial individual
const histInd=[];
PRUEBAS_HIST.forEach(pr=>{
const r=pr.res.find(x=>x.nombre===nombre);
if(r){
const ptsNum=parseFloat(String(r.pts).replace('+1',''))+(/\+1/.test(r.pts)?1:0);
histInd.push({prueba:pr.nombre,stb:r.stb,pts:ptsNum});
}
});

// Historial LIV
const histLiv=[];
PRUEBAS_HIST.forEach(pr=>{
pr.liv.forEach(eq=>{
if(eq.jug.includes(nombre)){
histLiv.push({prueba:pr.nombre,ptsLIV:eq.pLIV});
}
});
});

const pruebasInd=histInd.length;
const pruebasLiv=histLiv.length;
if(pruebasInd===0)return;

// Calcular medias
const mediaInd=histInd.reduce((s,h)=>s+h.pts,0)/pruebasInd;
const mediaStb=histInd.reduce((s,h)=>s+h.stb,0)/pruebasInd;
const mediaLiv=pruebasLiv>0?histLiv.reduce((s,h)=>s+h.ptsLIV,0)/pruebasLiv:0;

// Calcular desviación estándar
const desviacionInd=Math.sqrt(histInd.reduce((s,h)=>s+Math.pow(h.pts-mediaInd,2),0)/pruebasInd);
const desviacionLiv=pruebasLiv>0?Math.sqrt(histLiv.reduce((s,h)=>s+Math.pow(h.ptsLIV-mediaLiv,2),0)/pruebasLiv):5;

// Calcular tendencia (últimas 3 pruebas vs anteriores)
let tendenciaInd=0;
if(pruebasInd>=3){
const ultimas3=histInd.slice(-3);
const anteriores=histInd.slice(0,-3);
if(anteriores.length>0){
const mediaUlt=ultimas3.reduce((s,h)=>s+h.pts,0)/3;
const mediaAnt=anteriores.reduce((s,h)=>s+h.pts,0)/anteriores.length;
tendenciaInd=mediaUlt-mediaAnt;
}
}

// Puntos actuales
const totalInd=CLASIF.find(c=>c.nombre===nombre)?.total||0;
const totalLiv=CLASIF_LIV.find(c=>c.nombre===nombre)?.total||0;

stats.push({
nombre,hcp,pruebasInd,pruebasLiv,
mediaInd:Math.round(mediaInd*10)/10,
mediaStb:Math.round(mediaStb*10)/10,
mediaLiv:Math.round(mediaLiv*10)/10,
desviacionInd:Math.round(desviacionInd*10)/10,
desviacionLiv:Math.round(desviacionLiv*10)/10,
tendenciaInd:Math.round(tendenciaInd*10)/10,
totalInd,totalLiv
});
});
return stats;
};

// Simulación Monte Carlo para probabilidades
const simularTemporada=(stats,tipo='ind',numSim=10000)=>{
const PRUEBAS_RESTANTES=8;
const victorias={};
stats.forEach(s=>victorias[s.nombre]=0);

for(let sim=0;sim<numSim;sim++){
const puntosFinales={};

stats.forEach(s=>{
// Puntos actuales
let puntos=tipo==='ind'?s.totalInd:s.totalLiv;
const media=tipo==='ind'?s.mediaInd:s.mediaLiv;
const desv=tipo==='ind'?s.desviacionInd:s.desviacionLiv;
const tendencia=tipo==='ind'?s.tendenciaInd:0;

// Factor de handicap (jugadores con mejor hcp tienden a ser más consistentes)
const factorHcp=1-(s.hcp/36)*0.2;

// Factor de participación (más pruebas = más fiable la proyección)
const factorPart=Math.min(1,(tipo==='ind'?s.pruebasInd:s.pruebasLiv)/6);

// Simular cada prueba restante
for(let p=0;p<PRUEBAS_RESTANTES;p++){
// Generar puntos aleatorios con distribución normal aproximada
const u1=Math.random(),u2=Math.random();
const z=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);

// Media ajustada por tendencia y factor de participación
const mediaAjust=media+(tendencia*0.3*factorPart);
// Desviación ajustada por handicap y participación
const desvAjust=desv*(1.5-factorHcp*factorPart);

let ptsPrueba=mediaAjust+z*desvAjust;
// Limitar a rangos realistas
if(tipo==='ind')ptsPrueba=Math.max(0,Math.min(16,ptsPrueba));
else ptsPrueba=Math.max(0,Math.min(15,ptsPrueba));

puntos+=ptsPrueba;
}
puntosFinales[s.nombre]=puntos;
});

// Determinar ganador
let ganador=null,maxPts=-1;
Object.entries(puntosFinales).forEach(([nombre,pts])=>{
if(pts>maxPts){maxPts=pts;ganador=nombre;}
});
if(ganador)victorias[ganador]++;
}

// Calcular probabilidades
const probs=[];
stats.forEach(s=>{
probs.push({
nombre:s.nombre,
prob:Math.round((victorias[s.nombre]/numSim)*1000)/10
});
});
return probs.sort((a,b)=>b.prob-a.prob);
};

}

// ========== PANTALLA DE ESTADÍSTICAS ==========
const EstadisticasScr=()=>{
const[stab,setStab]=useState('ind');
const stats=React.useMemo(()=>calcEstadisticas(),[]);
const probsInd=React.useMemo(()=>simularTemporada(stats,'ind',10000),[stats]);
const probsLiv=React.useMemo(()=>simularTemporada(stats,'liv',10000),[stats]);

// Combinar stats con probabilidades
const dataInd=stats.map(s=>({
...s,
prob:probsInd.find(p=>p.nombre===s.nombre)?.prob||0
})).sort((a,b)=>b.prob-a.prob);

const dataLiv=stats.map(s=>({
...s,
prob:probsLiv.find(p=>p.nombre===s.nombre)?.prob||0
})).sort((a,b)=>b.prob-a.prob);

const data=stab==='ind'?dataInd:dataLiv;

const getTendIcon=(t)=>t>1?'📈':t<-1?'📉':'➡️';
const getBarColor=(prob)=>{
if(prob>=30)return'#4caf50';
if(prob>=15)return'#ff9800';
if(prob>=5)return'#2196f3';
return'#9e9e9e';
};

return(
<div className="scroll">
<header className="hdr"><button className="hdr-back" onClick={()=>setScr('home')}>←</button><h1>📊 Estadísticas</h1></header>
<div className="tabs">
<button className={`tab ${stab==='ind'?'active':''}`} onClick={()=>setStab('ind')}>🏆 Individual</button>
<button className={`tab ${stab==='liv'?'liv':''}`} onClick={()=>setStab('liv')}>⚡ LIV</button>
</div>
<div className="sec">
<div style={{background:'linear-gradient(135deg,#1a237e,#3949ab)',borderRadius:12,padding:15,marginBottom:15,color:'#fff'}}>
<div style={{fontSize:13,opacity:0.9,marginBottom:5}}>🎯 Probabilidad calculada con simulación Monte Carlo</div>
<div style={{fontSize:11,opacity:0.7}}>Basada en: handicap, media de puntos, tendencia y participación ({stats[0]?.pruebasInd||0} pruebas jugadas, 8 restantes)</div>
</div>

<div style={{fontSize:12,fontWeight:600,color:'#666',marginBottom:10,display:'grid',gridTemplateColumns:'1fr 55px 55px 70px',gap:8,padding:'0 5px'}}>
<span>Jugador</span>
<span style={{textAlign:'center'}}>Media</span>
<span style={{textAlign:'center'}}>Tend.</span>
<span style={{textAlign:'right'}}>Prob. Ganar</span>
</div>

{data.map((s,i)=>(
<div key={s.nombre} style={{
background:i===0?'linear-gradient(135deg,#fff9c4,#fff176)':i===1?'linear-gradient(135deg,#f5f5f5,#e0e0e0)':i===2?'linear-gradient(135deg,#ffe0b2,#ffcc80)':'#fff',
borderRadius:10,padding:12,marginBottom:8,
boxShadow:i<3?'0 2px 8px rgba(0,0,0,0.1)':'0 1px 3px rgba(0,0,0,0.05)',
border:i===0?'2px solid #ffd54f':'1px solid #eee'
}}>
<div style={{display:'grid',gridTemplateColumns:'1fr 55px 55px 70px',gap:8,alignItems:'center'}}>
<div>
<div style={{fontWeight:700,fontSize:14,display:'flex',alignItems:'center',gap:6}}>
{i===0&&'🥇'}{i===1&&'🥈'}{i===2&&'🥉'}{s.nombre}
</div>
<div style={{fontSize:11,color:'#888',marginTop:2}}>
Hcp {s.hcp} • {stab==='ind'?s.pruebasInd:s.pruebasLiv} pruebas • {stab==='ind'?s.totalInd:s.totalLiv} pts
</div>
</div>
<div style={{textAlign:'center'}}>
<div style={{fontWeight:700,fontSize:15,color:'#1565c0'}}>{stab==='ind'?s.mediaInd:s.mediaLiv}</div>
<div style={{fontSize:10,color:'#888'}}>pts/prueba</div>
</div>
<div style={{textAlign:'center'}}>
<div style={{fontSize:18}}>{getTendIcon(s.tendenciaInd)}</div>
<div style={{fontSize:10,color:s.tendenciaInd>0?'#4caf50':s.tendenciaInd<0?'#f44336':'#888'}}>
{s.tendenciaInd>0?'+':''}{s.tendenciaInd}
</div>
</div>
<div style={{textAlign:'right'}}>
<div style={{fontWeight:700,fontSize:16,color:getBarColor(s.prob)}}>{s.prob}%</div>
<div style={{height:4,background:'#e0e0e0',borderRadius:2,marginTop:4,overflow:'hidden'}}>
<div style={{height:'100%',width:`${Math.min(100,s.prob*2)}%`,background:getBarColor(s.prob),borderRadius:2}}></div>
</div>
</div>
</div>
</div>
))}

<div style={{background:'#f5f5f5',borderRadius:10,padding:12,marginTop:15,fontSize:11,color:'#666'}}>
<div style={{fontWeight:600,marginBottom:8}}>📋 Cómo se calcula la probabilidad:</div>
<ul style={{margin:0,paddingLeft:20,lineHeight:1.6}}>
<li><b>Media de puntos</b>: Promedio histórico en pruebas jugadas</li>
<li><b>Tendencia</b>: Comparación últimas 3 pruebas vs anteriores</li>
<li><b>Handicap</b>: Jugadores con mejor hcp son más consistentes</li>
<li><b>Participación</b>: Más pruebas = predicción más fiable</li>
<li><b>Simulación</b>: 10,000 escenarios de las 8 pruebas restantes</li>
</ul>
</div>
</div>
</div>
);};

const golpes=scores[`${j.id}-${hoyoEdicion}`]||0;
const hcp=hcpJ(j.hcp,j.esR);
const extra=hoyoEdit?gE(hcp,hoyoEdit.i):0;
const pts=hoyoEdit?stb(golpes,hoyoEdit.p,extra):0;
return(
<div key={j.id} style={{background:'#fff',borderRadius:10,padding:14,marginBottom:10}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
<div><span style={{fontWeight:700}}>{j.nombre}</span>{extra>0&&<span style={{fontSize:11,color:'var(--pri)',marginLeft:6}}>+{extra}</span>}</div>
<div style={{fontSize:12,color:'var(--pri)',fontWeight:700}}>{pts} pts</div>
</div>
<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:15}}>
<button onClick={()=>cambiarScore(j.id,hoyoEdicion,golpes-1)} disabled={golpes<=0} style={{width:44,height:44,borderRadius:'50%',border:'none',background:'#ffebee',color:'#c62828',fontSize:20,fontWeight:700,cursor:'pointer'}}>−</button>
<div style={{width:60,height:50,background:'#f5f5f5',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:700,color:'var(--pri)'}}>{golpes||'-'}</div>
<button onClick={()=>cambiarScore(j.id,hoyoEdicion,golpes+1)} style={{width:44,height:44,borderRadius:'50%',border:'none',background:'#e8f5e9',color:'#2e7d32',fontSize:20,fontWeight:700,cursor:'pointer'}}>+</button>
</div>
</div>
);})}
<button className="btn btn-pri" style={{marginTop:15}} onClick={()=>{if(confirm('¿Guardar correcciones?'))guardarTodo();}}>💾 GUARDAR CORRECCIONES</button>
<button className="btn btn-sec" style={{marginTop:10}} onClick={salirScoring}>✅ TERMINAR Y SALIR</button>
</div>
<div className="sec">
<div className="lb"><div className="lb-hdr"><span className="lb-title">🏆 RESULTADO FINAL GLOBAL</span></div>
{lbGlobal.map((j,i)=><div key={j.id} className="lb-row"><span className={`lb-pos ${i<3?'p'+(i+1):''}`}>{i+1}</span><span className="lb-name">{j.nombre} {j.hcp} ({j.esR?Math.floor(j.hcp):Math.ceil(j.hcp)})</span><span className="lb-thru">{j.hoyosJugados} hoyos</span><span className="lb-score">{j.totalPts}</span></div>)}
</div>
</div>
</div>
);
}

// MODO SCORING NORMAL
return(
<div className="scroll" style={{paddingBottom:20}}>
<div className="hole-hdr">
<button className="hole-nav-btn" disabled={hole<=1} onClick={()=>setHole(h=>h-1)}>←</button>
<div className="hole-center"><div className="hole-num">HOYO</div><div className="hole-big">{hole}</div><div className="hole-details">Par {hoyoAct.p} • Index {hoyoAct.i}</div></div>
<button className="hole-nav-btn" disabled={hole>=18} onClick={()=>setHole(h=>h+1)}>→</button>
</div>
<div className="sec">
<p style={{fontSize:11,color:'#666',marginBottom:12,textAlign:'center'}}>Introduce el score de cada jugador. Cuando todos tengan score, confirma el hoyo.</p>
{jugadores_partida.map(j=>{
const hcp=hcpJ(j.hcp,j.esR);const extra=gE(hcp,hoyoAct.i);const golpes=scores[`${j.id}-${hole}`]||0;const pts=stb(golpes,hoyoAct.p,extra);
let tot=0;for(let h=1;h<=18;h++){const g=scores[`${j.id}-${h}`];if(g>0){const ho=campoAct.hoyos.find(x=>x.n===h);if(ho)tot+=stb(g,ho.p,gE(hcp,ho.i));}}
const tieneScore=golpes>0;
return(
<div key={j.id} className="player-score" style={{border:tieneScore?'2px solid #4caf50':'2px solid #ffcc80',background:tieneScore?'#e8f5e9':'#fff'}}>
<div className="player-row"><div><span className="player-name">{j.nombre} {j.hcp} ({j.esR?Math.floor(j.hcp):Math.ceil(j.hcp)})</span>{extra!==0&&<span className="player-extra">{extra>0?'+':''}{extra}</span>}{tieneScore&&<span style={{marginLeft:8,color:'#4caf50'}}>✓</span>}</div><span className="player-total">{tot}</span></div>
<div className="stroke-row">
<button className="stroke-btn minus" onClick={()=>cambiarScore(j.id,hole,golpes-1)}>−</button>
<div><div className="stroke-val">{golpes||'-'}</div><div className="stroke-pts">{golpes>0&&<><b>{pts}</b> pts</>}</div></div>
<button className="stroke-btn plus" onClick={()=>cambiarScore(j.id,hole,golpes+1)}>+</button>
</div>
</div>
);})}

{/* Botón de confirmar hoyo - solo aparece cuando todos tienen score */}
{todosConScore?(
<div style={{marginTop:16}}>
{esUltimoHoyo?(
<button className="btn btn-danger" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,animation:'pulse 1.5s infinite'}} onClick={()=>{if(confirm('¿Confirmar scores del HOYO 18 y FINALIZAR la partida?'))finalizarPartida();}}>
<span style={{fontSize:20}}>🏁</span> CONFIRMAR HOYO 18 Y FINALIZAR
</button>
):(
<button className="btn btn-pri" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:'linear-gradient(135deg,#4caf50,#2e7d32)'}} onClick={()=>{if(confirm(`¿Confirmar scores del HOYO ${hole}?\n\nTras confirmar se guardará y pasará al hoyo ${hole+1}.`))confirmarHoyo();}}>
<span style={{fontSize:18}}>✅</span> CONFIRMAR HOYO {hole} → Siguiente
</button>
)}
</div>
):(
<div style={{marginTop:16,padding:14,background:'#fff3e0',borderRadius:10,textAlign:'center'}}>
<span style={{fontSize:24}}>⏳</span>
<p style={{fontSize:13,color:'#e65100',margin:'8px 0 0',fontWeight:600}}>Falta el score de {jugadores_partida.filter(j=>!(scores[`${j.id}-${hole}`]>0)).map(j=>j.nombre).join(', ')}</p>
</div>
)}

<div style={{marginTop:16}}>
<div className="lb"><div className="lb-hdr"><span className="lb-title"><span className="live-dot"></span> LEADERBOARD GLOBAL</span><span style={{fontSize:10,opacity:.7}}>{lbGlobal.length} jugadores</span></div>
{lbGlobal.length>0?lbGlobal.map((j,i)=>{
const esDeEstaPartida=partidaActiva?.jug?.find(x=>x.id===j.id);
return(<div key={j.id} className="lb-row" style={{background:esDeEstaPartida?'rgba(198,40,40,0.1)':'transparent'}}><span className={`lb-pos ${i<3?'p'+(i+1):''}`}>{i+1}</span><span className="lb-name">{j.nombre} {j.hcp} ({j.esR?Math.floor(j.hcp):Math.ceil(j.hcp)}){esDeEstaPartida&&<span style={{marginLeft:4,fontSize:10}}>●</span>}</span><span className="lb-thru">Thru {j.hoyosJugados||'-'}</span><span className="lb-score">{j.totalPts}</span></div>);
}):<div className="lb-row" style={{justifyContent:'center',color:'#888'}}>Sin datos</div>}
</div>
</div>
<button className="btn btn-sec" style={{marginTop:12}} onClick={()=>{if(confirm('¿Salir sin guardar? Los datos del hoyo actual se perderán si no confirmas.'))salirScoring();}}>← Salir</button>
</div>
</div>
);};

// MODALS
const LoginModal=()=>{
const[pwd,setPwd]=useState('');const[err,setErr]=useState(false);
return(
<div className="modal-overlay" onClick={()=>setShowLogin(false)}>
<div className="modal" onClick={e=>e.stopPropagation()}>
<div className="modal-hdr"><span className="modal-title">🔐 Admin General</span><button className="modal-close" onClick={()=>setShowLogin(false)}>×</button></div>
<div className="modal-body">
<div className="form-group"><label className="form-label">Contraseña</label><input type="password" className="form-input" value={pwd} onChange={e=>{setPwd(e.target.value);setErr(false);}} placeholder="Introduce contraseña"/>{err&&<p style={{color:'red',fontSize:11,marginTop:5}}>Contraseña incorrecta</p>}</div>
</div>
<div className="modal-footer"><button className="btn btn-pri" onClick={()=>pwd==='maniac2025'?login(pwd):setErr(true)}>Entrar</button></div>
</div>
</div>
);};

const PartidaLoginModal=()=>{
const[code,setCode]=useState('');const[err,setErr]=useState(false);
const tryAccess=()=>{
if(accessByCode(code.toUpperCase())){setShowPartidaLogin(false);setCode('');}
else setErr(true);
};
return(
<div className="modal-overlay" onClick={()=>setShowPartidaLogin(false)}>
<div className="modal" onClick={e=>e.stopPropagation()}>
<div className="modal-hdr"><span className="modal-title">🎯 Acceso Admin Partida</span><button className="modal-close" onClick={()=>setShowPartidaLogin(false)}>×</button></div>
<div className="modal-body">
<p style={{fontSize:13,color:'#666',marginBottom:15}}>Introduce el código de 4 letras que te dio el organizador</p>
<div className="form-group"><label className="form-label">Código de Partida</label><input type="text" className="form-input" value={code} onChange={e=>{setCode(e.target.value.toUpperCase());setErr(false);}} placeholder="XXXX" maxLength={4} style={{textAlign:'center',fontSize:24,letterSpacing:8,fontFamily:'monospace'}}/>{err&&<p style={{color:'red',fontSize:11,marginTop:5}}>Código no válido o partida sin jugadores</p>}</div>
</div>
<div className="modal-footer"><button className="btn btn-pri" onClick={tryAccess}>Acceder</button></div>
</div>
</div>
);};

// RENDER
const showNav=!['jugador-detalle','detalle','scoring'].includes(scr)&&!admScr;
return(
<div className="app">
{scr==='home'&&!admScr&&<HomeScr/>}
{scr==='calendario'&&!admScr&&<CalendarioScr/>}
{scr==='viaje'&&!admScr&&<ViajeScr/>}
{scr==='clasificacion'&&!admScr&&<ClasifScr/>}
{scr==='estadisticas'&&!admScr&&<EstadisticasScr/>}
{scr==='jugadores'&&!admScr&&<JugadoresScr/>}
{scr==='jugador-detalle'&&<JugadorDetalleScr/>}
{scr==='historico'&&!admScr&&<HistoricoScr/>}
{scr==='detalle'&&<DetalleScr/>}
{scr==='live'&&!admScr&&<LiveScr/>}
{scr==='admin'&&!admScr&&<AdminScr/>}
{scr==='scoring'&&<ScoringScr/>}
{admScr==='inscritos'&&!selPrueba&&<AdminInsScr/>}
{admScr==='conf-ins'&&selPrueba&&<ConfInsScr/>}
{admScr==='partidas'&&!selPrueba&&<AdminPartScr/>}
{admScr==='conf-part'&&selPrueba&&<ConfPartScr/>}
{admScr==='liv'&&!selPrueba&&<AdminLIVScr/>}
{admScr==='conf-liv'&&selPrueba&&<ConfLIVScr/>}
{admScr==='jugadores'&&<AdminJugadoresScr/>}
{admScr==='ryder'&&<AdminRyderScr/>}
{admScr==='editscores'&&<AdminEditScoresScr/>}
{admScr==='campos'&&<AdminCamposScr/>}
{showNav&&<nav className="nav">
<button className={`nav-btn ${scr==='home'?'active':''}`} onClick={()=>{setAdmScr(null);setSelPrueba(null);setScr('home');}}><span className="nav-icon">🏠</span><span className="nav-label">Inicio</span></button>
<button className={`nav-btn ${scr==='calendario'?'active':''}`} onClick={()=>{setAdmScr(null);setSelPrueba(null);setScr('calendario');}}><span className="nav-icon">📅</span><span className="nav-label">Calendario</span></button>
<button className={`nav-btn ${scr==='clasificacion'?'active':''}`} onClick={()=>{setAdmScr(null);setSelPrueba(null);setScr('clasificacion');}}><span className="nav-icon">🏆</span><span className="nav-label">Ranking</span></button>
<button className={`nav-btn ${scr==='estadisticas'?'active':''}`} onClick={()=>{setAdmScr(null);setSelPrueba(null);setScr('estadisticas');}}><span className="nav-icon">📊</span><span className="nav-label">Stats</span></button>
<button className={`nav-btn ${scr==='admin'||admScr?'active':''}`} onClick={()=>{setSelPrueba(null);isAdmin?setScr('admin'):setShowLogin(true);}}><span className="nav-icon">{isAdmin?'⚙️':'🔐'}</span><span className="nav-label">Admin</span></button>
</nav>}
{showLogin&&<LoginModal/>}
{showPartidaLogin&&<PartidaLoginModal/>}
{showEditModal&&<EditJugadorModal/>}
{showViajeLogin&&<ViajeLoginModal/>}
</div>
);};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
